<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticking Away</title>

    <style>
      [hidden] {
        display: none !important;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: #000;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 20px;
        background: #0a0a0a;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: baseline;
        gap: 20px;
      }

      header h1 {
        font-size: 18px;
        font-weight: 600;
        background: linear-gradient(90deg, #ff0000, #ff8000, #ffff00, #00ff00, #0080ff, #8000ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      header .subtitle {
        font-size: 13px;
        font-style: italic;
        color: #666;
      }

      header a {
        color: #6699ff;
        text-decoration: none;
        font-size: 13px;
      }

      header a:hover {
        text-decoration: underline;
      }

      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      #canvas-container {
        flex: 1;
        position: relative;
        background: #000;
      }

      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #controls {
        width: 280px;
        background: #0a0a0a;
        border-left: 1px solid #222;
        padding: 16px;
        overflow-y: auto;
      }

      .control-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control-group label {
        font-size: 13px;
        color: #aaa;
      }

      .control-group input[type="range"] {
        width: 100%;
        accent-color: #6699ff;
      }

      .control-group input[type="checkbox"] {
        accent-color: #6699ff;
      }

      .control-group select {
        width: 100%;
        padding: 6px 8px;
        background: #1a1a1a;
        color: #e0e0e0;
        border: 1px solid #333;
        border-radius: 4px;
        font-size: 13px;
      }

      .control-group select:focus {
        outline: none;
        border-color: #6699ff;
      }

      .control-group select:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .action-button {
        background: #3366cc;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }

      .action-button:hover {
        background: #4477dd;
      }

      .action-button.secondary {
        background: #333;
      }

      .action-button.secondary:hover {
        background: #444;
      }

      .action-button:disabled {
        background: #222;
        color: #666;
        cursor: not-allowed;
      }

      .action-button:disabled:hover {
        background: #222;
      }

      .button-row {
        display: flex;
        gap: 8px;
      }

      .button-row .action-button {
        flex: 1;
      }

      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        color: #555;
        letter-spacing: 0.5px;
        margin-top: 8px;
      }

      .active,
      .inactive {
        margin-left: 8px;
        font-size: 11px;
      }

      .active {
        color: #4caf50;
      }

      .inactive {
        color: #888;
      }

      .fps {
        margin-left: 8px;
        font-size: 11px;
        color: #888;
      }

      .debug-label {
        margin-left: 8px;
        font-size: 12px;
        color: #999;
        font-family: monospace;
      }
    </style>
  </head>

  <body>
    <header data-bind="hidden:mode.hideControls">
      <h1>Ticking Away</h1>
      <span class="subtitle">the moments that make up a dull day.</span>
    </header>

    <main>
      <div id="canvas-container">
        <canvas id="canvas" data-bind="onclick:mode.toggleClockOnly"></canvas>
      </div>
      <aside id="controls" data-bind="hidden:mode.hideControls">
        <div class="control-panel">
          <!-- Live Mode Toggle -->
          <div class="section-title">Mode</div>
          <div class="control-group">
            <label
              ><input type="checkbox" data-bind="checked:mode.live, onchange:mode.toggleLive" />
              Live Mode
              <span class="fps" data-bind="textContent:mode.fpsText"></span>
            </label>
          </div>
          <div class="button-row">
            <button
              class="action-button"
              data-bind="onclick:mode.enterFullscreen, disabled:mode.fullscreenDisabled"
            >
              Fullscreen
            </button>
          </div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:mode.accelerated, onchange:mode.toggleAccelerated"
              />
              Accelerated</label
            >
          </div>
          <div class="control-group">
            <label>Speed</label>
            <select
              data-bind="value:mode.accelerationFactor, onchange:mode.setAccelerationFactor, disabled:!mode.accelerated"
            >
              <option value="1">1 min/sec</option>
              <option value="10">10 min/sec</option>
              <option value="30">30 min/sec</option>
              <option value="60">1 hour/sec</option>
              <option value="120">2 hours/sec</option>
            </select>
          </div>

          <!-- Time Controls (hidden in live mode) -->
          <div class="section-title" data-bind="hidden:mode.live">Time</div>
          <div class="control-group" data-bind="hidden:mode.live">
            <label
              >Hour: <span data-bind="textContent:time.hours">10</span>
              <span class="debug-label"
                >(exit u: <span data-bind="textContent:debug.exitUFormatted">0</span>)</span
              >
            </label>
            <input
              type="range"
              min="0"
              max="11"
              data-bind="value:time.hours, oninput:time.setHours"
            />
          </div>
          <div class="control-group" data-bind="hidden:mode.live">
            <label
              >Minute: <span data-bind="textContent:time.minutes">10</span>
              <span class="debug-label"
                >(entry u: <span data-bind="textContent:debug.entryUFormatted">0</span>)</span
              >
            </label>
            <input
              type="range"
              min="0"
              max="59"
              data-bind="value:time.minutes, oninput:time.setMinutes"
            />
          </div>
          <div class="button-row" data-bind="hidden:mode.live">
            <button class="action-button" data-bind="onclick:time.setNow">Set to Now</button>
          </div>

          <!-- Prism Controls -->
          <div class="section-title">Prism</div>
          <div class="control-group">
            <label>Size: <span data-bind="textContent:prism.size">60</span>%</label>
            <input
              type="range"
              min="10"
              max="90"
              data-bind="value:prism.size, oninput:prism.setSize"
            />
          </div>
          <div class="control-group">
            <label
              >Rainbow Spread: <span data-bind="textContent:prism.rainbowSpread">50</span>%</label
            >
            <input
              type="range"
              min="0"
              max="100"
              data-bind="value:prism.rainbowSpread, oninput:prism.setRainbowSpread"
            />
          </div>
          <div class="control-group">
            <label>Prism Gray: <span data-bind="textContent:prism.gray">80</span></label>
            <input
              type="range"
              min="0"
              max="255"
              data-bind="value:prism.gray, oninput:prism.setGray"
            />
          </div>
          <div class="control-group">
            <label>Blue Tint: <span data-bind="textContent:prism.blueTint">0</span></label>
            <input
              type="range"
              min="0"
              max="100"
              data-bind="value:prism.blueTint, oninput:prism.setBlueTint"
            />
          </div>
          <div class="control-group">
            <label>Glow Width: <span data-bind="textContent:prism.glowWidth">15</span>%</label>
            <input
              type="range"
              min="5"
              max="50"
              data-bind="value:prism.glowWidth, oninput:prism.setGlowWidth"
            />
          </div>
          <div class="control-group">
            <label
              >Glow Intensity: <span data-bind="textContent:prism.glowIntensity">100</span>%</label
            >
            <input
              type="range"
              min="10"
              max="100"
              data-bind="value:prism.glowIntensity, oninput:prism.setGlowIntensity"
            />
          </div>
          <div class="control-group">
            <label>Glow Falloff</label>
            <select data-bind="value:prism.glowFalloff, onchange:prism.setGlowFalloff">
              <option value="0">Linear</option>
              <option value="1">Quadratic</option>
              <option value="2">Cubic</option>
              <option value="3">Exponential</option>
            </select>
          </div>

          <!-- Ray Controls -->
          <div class="section-title">Rays</div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:rays.gradientFill, onchange:rays.toggleGradientFill"
              />
              Gradient Fill</label
            >
          </div>
          <div class="control-group">
            <label>Glow Width: <span data-bind="textContent:rays.glowWidth">3</span>%</label>
            <input
              type="range"
              min="0"
              max="10"
              data-bind="value:rays.glowWidth, oninput:rays.setGlowWidth"
            />
          </div>
          <div class="control-group">
            <label
              >Glow Intensity: <span data-bind="textContent:rays.glowIntensity">50</span>%</label
            >
            <input
              type="range"
              min="0"
              max="100"
              data-bind="value:rays.glowIntensity, oninput:rays.setGlowIntensity"
            />
          </div>
          <div class="control-group">
            <label>Glow Falloff</label>
            <select data-bind="value:rays.glowFalloff, onchange:rays.setGlowFalloff">
              <option value="0">Linear</option>
              <option value="1">Quadratic</option>
              <option value="2">Cubic</option>
              <option value="3">Exponential</option>
            </select>
          </div>
          <div class="control-group">
            <label>Color Palette</label>
            <select data-bind="value:rays.palette, onchange:rays.setPalette">
              <option value="0">OkLCH Balanced</option>
              <option value="1">Saturated</option>
              <option value="2">Spectral</option>
              <option value="3">Neon</option>
              <option value="4">Muted</option>
            </select>
          </div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:rays.reverseSpectrum, onchange:rays.toggleReverseSpectrum"
              />
              Reverse Spectrum</label
            >
          </div>
          <!-- Marker Controls -->
          <div class="section-title">Markers</div>
          <div class="control-group">
            <label>Length: <span data-bind="textContent:markers.length">6</span>%</label>
            <input
              type="range"
              min="2"
              max="20"
              data-bind="value:markers.length, oninput:markers.setLength"
            />
          </div>
          <div class="control-group">
            <label>Glow Width: <span data-bind="textContent:markers.glowWidth">2</span>%</label>
            <input
              type="range"
              min="0"
              max="5"
              data-bind="value:markers.glowWidth, oninput:markers.setGlowWidth"
            />
          </div>
          <div class="control-group">
            <label
              >Glow Intensity: <span data-bind="textContent:markers.glowIntensity">60</span>%</label
            >
            <input
              type="range"
              min="0"
              max="100"
              data-bind="value:markers.glowIntensity, oninput:markers.setGlowIntensity"
            />
          </div>
          <div class="control-group">
            <label>Glow Falloff</label>
            <select data-bind="value:markers.glowFalloff, onchange:markers.setGlowFalloff">
              <option value="0">Linear</option>
              <option value="1">Quadratic</option>
              <option value="2">Cubic</option>
              <option value="3">Exponential</option>
            </select>
          </div>

          <!-- Background -->
          <div class="section-title">Background</div>
          <div class="control-group">
            <label>Grain: <span data-bind="textContent:background.grainIntensity">50</span>%</label>
            <input
              type="range"
              min="0"
              max="100"
              data-bind="value:background.grainIntensity, oninput:background.setGrainIntensity, disabled:background.grainDisabled"
            />
          </div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:background.grainPrismOnly, onchange:background.toggleGrainPrismOnly, disabled:background.grainDisabled"
              />
              Prism Only</label
            >
          </div>
          <div class="control-group">
            <label
              >Grain Threshold:
              <span data-bind="textContent:background.grainBrightnessThreshold">25</span>%</label
            >
            <input
              type="range"
              min="1"
              max="100"
              data-bind="value:background.grainBrightnessThreshold, oninput:background.setGrainBrightnessThreshold, disabled:background.grainDisabled"
            />
          </div>

          <!-- Dithering -->
          <div class="section-title">Dithering (6-Color E-Ink)</div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:dither.enabled, onchange:dither.toggleEnabled"
              />
              Enable Dithering</label
            >
          </div>
          <div class="control-group">
            <label>Kernel</label>
            <select
              data-bind="value:dither.kernel, onchange:dither.setKernel, disabled:!dither.enabled"
            >
              <option value="0">Atkinson (75%)</option>
              <option value="1">Floyd-Steinberg (100%)</option>
            </select>
          </div>
          <div class="control-group">
            <label>Palette Mode</label>
            <select
              data-bind="value:dither.paletteMode, onchange:dither.setPaletteMode, disabled:!dither.enabled"
            >
              <option value="0">Ideal (Pure RGB)</option>
              <option value="1">Device (Inky 13.3")</option>
              <option value="2">Blend</option>
            </select>
          </div>
          <div class="control-group">
            <label
              >Saturation:
              <span data-bind="textContent:dither.paletteSaturation">50</span>%</label
            >
            <input
              type="range"
              min="0"
              max="100"
              data-bind="value:dither.paletteSaturation, oninput:dither.setPaletteSaturation, disabled:dither.saturationDisabled"
            />
          </div>
          <div class="control-group">
            <label>Strength: <span data-bind="textContent:dither.strength">100</span>%</label>
            <input
              type="range"
              min="0"
              max="100"
              data-bind="value:dither.strength, oninput:dither.setStrength, disabled:!dither.enabled"
            />
          </div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:dither.oklabError, onchange:dither.toggleOklabError, disabled:!dither.enabled"
              />
              OkLab Error Diffusion</label
            >
          </div>

          <!-- Display Options -->
          <div class="section-title">Display</div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:display.markers, onchange:display.toggleMarkers"
              />
              Show Markers</label
            >
          </div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:display.pebble, onchange:display.togglePebble"
              />
              Pebble Mode (260x260)</label
            >
          </div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:display.highDpi, onchange:display.toggleHighDpi"
              />
              High DPI</label
            >
          </div>

          <!-- Reset -->
          <div class="section-title">Reset</div>
          <div class="button-row">
            <button class="action-button secondary" data-bind="onclick:resetAll.reset">
              Reset All to Defaults
            </button>
          </div>
        </div>
      </aside>
    </main>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
