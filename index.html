<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticking Away</title>

    <style>
      [hidden] {
        display: none !important;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: #000;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 20px;
        background: #0a0a0a;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: baseline;
        gap: 20px;
      }

      header h1 {
        font-size: 18px;
        font-weight: 600;
        background: linear-gradient(
          90deg,
          #ff0000,
          #ff8000,
          #ffff00,
          #00ff00,
          #0080ff,
          #8000ff
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      header .subtitle {
        font-size: 13px;
        font-style: italic;
        color: #666;
      }

      header a {
        color: #6699ff;
        text-decoration: none;
        font-size: 13px;
      }

      header a:hover {
        text-decoration: underline;
      }

      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      #canvas-container {
        flex: 1;
        position: relative;
        background: #000;
      }

      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #controls {
        width: 280px;
        background: #0a0a0a;
        border-left: 1px solid #222;
        padding: 16px;
        overflow-y: auto;
      }

      .control-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control-group label {
        font-size: 13px;
        color: #aaa;
      }

      .control-group input[type="range"] {
        width: 100%;
        accent-color: #6699ff;
      }

      .control-group input[type="checkbox"] {
        accent-color: #6699ff;
      }

      .control-group select {
        width: 100%;
        padding: 6px 8px;
        background: #1a1a1a;
        color: #e0e0e0;
        border: 1px solid #333;
        border-radius: 4px;
        font-size: 13px;
      }

      .control-group select:focus {
        outline: none;
        border-color: #6699ff;
      }

      .action-button {
        background: #3366cc;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }

      .action-button:hover {
        background: #4477dd;
      }

      .action-button.secondary {
        background: #333;
      }

      .action-button.secondary:hover {
        background: #444;
      }

      .button-row {
        display: flex;
        gap: 8px;
      }

      .button-row .action-button {
        flex: 1;
      }

      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        color: #555;
        letter-spacing: 0.5px;
        margin-top: 8px;
      }

      .active,
      .inactive {
        margin-left: 8px;
        font-size: 11px;
      }

      .active {
        color: #4caf50;
      }

      .inactive {
        color: #888;
      }

    </style>
  </head>

  <body>
    <header data-bind="hidden:fullscreen">
      <h1>Ticking Away</h1>
      <span class="subtitle">the moments that make up a dull day.</span>
    </header>

    <main>
      <div id="canvas-container">
        <canvas id="canvas"></canvas>
      </div>
      <aside id="controls" data-bind="hidden:fullscreen">
        <div class="control-panel">
          <!-- Live Mode Toggle -->
          <div class="section-title">Mode</div>
          <div class="control-group">
            <label
              ><input type="checkbox" data-bind="checked:liveMode, change:toggleLiveMode" /> Live
              Mode <span data-bind="textContent:wakeLockText, className:wakeLockClass"></span
            ></label>
          </div>
          <div class="control-group" data-bind="hidden:fullscreenHidden">
            <label
              ><input type="checkbox" data-bind="checked:fullscreen, change:toggleFullscreen" />
              Fullscreen</label
            >
          </div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:acceleratedTime, change:toggleAcceleratedTime"
              />
              Accelerated</label
            >
          </div>
          <div class="control-group" data-bind="hidden:accelerationHidden">
            <label>Speed</label>
            <select data-bind="value:accelerationFactor, change:setAccelerationFactor">
              <option value="1">1 min/sec</option>
              <option value="10">10 min/sec</option>
              <option value="30">30 min/sec</option>
              <option value="60">1 hour/sec</option>
              <option value="120">2 hours/sec</option>
            </select>
          </div>

          <!-- Time Controls (hidden in live mode) -->
          <div class="section-title" data-bind="hidden:liveMode">Time</div>
          <div class="control-group" data-bind="hidden:liveMode">
            <label>Hour: <span data-bind="textContent:hours">10</span></label>
            <input type="range" min="0" max="11" data-bind="value:hours, input:setHours" />
          </div>
          <div class="control-group" data-bind="hidden:liveMode">
            <label>Minute: <span data-bind="textContent:minutes">10</span></label>
            <input type="range" min="0" max="59" data-bind="value:minutes, input:setMinutes" />
          </div>
          <div class="control-group" data-bind="hidden:liveMode">
            <label>Second: <span data-bind="textContent:seconds">0</span></label>
            <input type="range" min="0" max="59" data-bind="value:seconds, input:setSeconds" />
          </div>
          <div class="button-row" data-bind="hidden:liveMode">
            <button class="action-button" data-bind="click:setNow">Set to Now</button>
          </div>

          <!-- Prism Controls -->
          <div class="section-title">Prism</div>
          <div class="control-group">
            <label>Size: <span data-bind="textContent:prismSize">60</span>%</label>
            <input type="range" min="10" max="90" data-bind="value:prismSize, input:setPrismSize" />
          </div>
          <div class="control-group">
            <label>Rainbow Spread: <span data-bind="textContent:rainbowSpread">50</span>%</label>
            <input
              type="range"
              min="0"
              max="100"
              data-bind="value:rainbowSpread, input:setRainbowSpread"
            />
          </div>
          <div class="control-group">
            <label>Prism Gray: <span data-bind="textContent:prismGray">80</span></label>
            <input
              type="range"
              min="0"
              max="255"
              data-bind="value:prismGray, input:setPrismGray"
            />
          </div>
          <div class="control-group">
            <label>Blue Tint: <span data-bind="textContent:prismBlueTint">0</span></label>
            <input
              type="range"
              min="0"
              max="50"
              data-bind="value:prismBlueTint, input:setPrismBlueTint"
            />
          </div>
          <div class="control-group">
            <label>Glow Width: <span data-bind="textContent:glowWidth">15</span>%</label>
            <input
              type="range"
              min="5"
              max="50"
              data-bind="value:glowWidth, input:setGlowWidth"
            />
          </div>
          <div class="control-group">
            <label>Glow Intensity: <span data-bind="textContent:glowIntensity">100</span>%</label>
            <input
              type="range"
              min="10"
              max="100"
              data-bind="value:glowIntensity, input:setGlowIntensity"
            />
          </div>
          <div class="control-group">
            <label>Glow Falloff</label>
            <select data-bind="value:glowFalloff, change:setGlowFalloff">
              <option value="0">Linear</option>
              <option value="1">Quadratic</option>
              <option value="2">Cubic</option>
              <option value="3">Exponential</option>
            </select>
          </div>

          <!-- Ray Controls -->
          <div class="section-title">Rays</div>
          <div class="control-group">
            <label>Glow Width: <span data-bind="textContent:rayGlowWidth">3</span>%</label>
            <input
              type="range"
              min="0"
              max="10"
              data-bind="value:rayGlowWidth, input:setRayGlowWidth"
            />
          </div>
          <div class="control-group">
            <label>Glow Intensity: <span data-bind="textContent:rayGlowIntensity">50</span>%</label>
            <input
              type="range"
              min="0"
              max="100"
              data-bind="value:rayGlowIntensity, input:setRayGlowIntensity"
            />
          </div>
          <div class="control-group">
            <label>Glow Falloff</label>
            <select data-bind="value:rayGlowFalloff, change:setRayGlowFalloff">
              <option value="0">Linear</option>
              <option value="1">Quadratic</option>
              <option value="2">Cubic</option>
              <option value="3">Exponential</option>
            </select>
          </div>

          <!-- Display Options -->
          <div class="section-title">Display</div>
          <div class="control-group">
            <label
              ><input
                type="checkbox"
                data-bind="checked:showSeconds, change:toggleShowSeconds, disabled:secondsDisabled"
              />
              Show Seconds</label
            >
          </div>
          <div class="control-group">
            <label
              ><input type="checkbox" data-bind="checked:minimalMode, change:toggleMinimalMode" />
              Minimal Mode (hide markers)</label
            >
          </div>
          <div class="control-group">
            <label
              ><input type="checkbox" data-bind="checked:pebbleMode, change:togglePebbleMode" />
              Pebble Mode (260x260)</label
            >
          </div>
        </div>
      </aside>
    </main>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
