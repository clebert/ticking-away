<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticking Away</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: #000;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 20px;
        background: #0a0a0a;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: baseline;
        gap: 20px;
      }

      header h1 {
        font-size: 18px;
        font-weight: 600;
        background: linear-gradient(90deg, #ff0000, #ff8000, #ffff00, #00ff00, #0080ff, #8000ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      header .subtitle {
        font-size: 13px;
        font-style: italic;
        color: #666;
      }

      header a {
        color: #6699ff;
        text-decoration: none;
        font-size: 13px;
      }

      header a:hover {
        text-decoration: underline;
      }

      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      #canvas-container {
        flex: 1;
        position: relative;
        background: #202830;
        display: block;
        text-decoration: none;
        cursor: pointer;
      }

      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }

      #controls {
        width: 280px;
        background: #0a0a0a;
        border-left: 1px solid #222;
        padding: 16px;
        overflow-y: auto;
      }

      .control-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control-group label {
        font-size: 13px;
        color: #aaa;
      }

      .control-group input[type="range"] {
        width: 100%;
        accent-color: #6699ff;
      }

      .control-group input[type="checkbox"] {
        accent-color: #6699ff;
      }

      .control-group select {
        width: 100%;
        padding: 6px 8px;
        background: #1a1a1a;
        color: #e0e0e0;
        border: 1px solid #333;
        border-radius: 4px;
        font-size: 13px;
      }

      .control-group select:focus {
        outline: none;
        border-color: #6699ff;
      }

      .control-group select:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .action-button {
        background: #3366cc;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }

      .action-button:hover {
        background: #4477dd;
      }

      .action-button.secondary {
        background: #333;
      }

      .action-button.secondary:hover {
        background: #444;
      }

      .action-button:disabled {
        background: #222;
        color: #666;
        cursor: not-allowed;
      }

      .action-button:disabled:hover {
        background: #222;
      }

      .button-row {
        display: flex;
        gap: 8px;
      }

      .button-row .action-button {
        flex: 1;
      }

      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        color: #555;
        letter-spacing: 0.5px;
        margin-top: 8px;
      }

      .fps {
        margin-left: 8px;
        font-size: 11px;
        color: #888;
      }

      .fullscreen-link {
        margin-left: auto;
      }

      #canvas-container.fullscreen {
        position: fixed;
        inset: 0;
        background: #202830;
      }
    </style>
  </head>

  <body>
    <script type="module" src="/src/app.tsx"></script>
  </body>
</html>
