<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticking Away</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #14110d;
        --panel: #1b1711;
        --panel-2: #221d15;
        --panel-hover: #2b251b;
        --ink: #ece0c8;
        --ink-dim: #a7967a;
        --ink-faint: #6f6149;
        --amber: #d99a4e;
        --amber-soft: #e8b873;
        --amber-deep: #c0772b;
        --rule: #3a2f20;
        --rule-soft: #2a2218;
        --canvas-bg: #0c0a07;
        --grain: url("data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20width=%22140%22%20height=%22140%22%3E%3Cfilter%20id=%22g%22%3E%3CfeTurbulence%20type=%22fractalNoise%22%20baseFrequency=%220.9%22%20numOctaves=%222%22%20stitchTiles=%22stitch%22/%3E%3CfeColorMatrix%20values=%220%200%200%200%201%200%200%200%200%201%200%200%200%200%201%200%200%200%200.65%200%22/%3E%3C/filter%3E%3Crect%20width=%22140%22%20height=%22140%22%20filter=%22url(%23g)%22%20opacity=%220.11%22/%3E%3C/svg%3E");
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Jost", "Futura", "Century Gothic", system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 15px 24px;
        background-color: var(--panel);
        background-image: var(--grain);
        border-bottom: 1px solid var(--rule);
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 8px 18px;
      }

      .brand {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 14px;
      }

      .brand .prism {
        align-self: center;
        position: relative;
        top: 1px;
        color: var(--amber);
        fill: none;
        filter: drop-shadow(0 0 6px rgb(from var(--amber) r g b / 0.45));
      }

      .brand .prism path {
        stroke: currentColor;
        stroke-width: 1.4;
        stroke-linejoin: round;
      }

      header h1 {
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--ink);
      }

      header .subtitle {
        font-size: 13px;
        font-style: italic;
        letter-spacing: 0.01em;
        color: var(--ink-dim);
      }

      .header-links {
        margin-left: auto;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 8px 20px;
      }

      header a {
        color: var(--amber);
        text-decoration: none;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      header a:hover {
        color: var(--amber-soft);
        text-decoration: underline;
        text-underline-offset: 4px;
      }

      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      #canvas-container {
        flex: 1;
        position: relative;
        background: var(--canvas-bg);
        display: block;
        text-decoration: none;
        cursor: pointer;
      }

      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* The backing store is antialiased at device resolution; "pixelated" would
           nearest-neighbor fractional-DPI/zoom scaling and reintroduce aliasing. */
        image-rendering: auto;
      }

      #controls {
        width: 280px;
        background-color: var(--panel);
        background-image: var(--grain);
        border-left: 1px solid var(--rule);
        padding: 18px 16px;
        overflow-y: auto;
      }

      .control-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control-group label {
        font-size: 12.5px;
        color: var(--ink-dim);
      }

      .control-group input[type="range"] {
        width: 100%;
        accent-color: var(--amber);
      }

      .control-group input[type="checkbox"] {
        accent-color: var(--amber);
      }

      .control-group select {
        width: 100%;
        padding: 6px 8px;
        background: var(--panel-2);
        color: var(--ink);
        border: 1px solid var(--rule);
        border-radius: 3px;
        font-family: inherit;
        font-size: 12.5px;
      }

      .control-group select:focus {
        outline: none;
        border-color: var(--amber);
      }

      .control-group select:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .action-button {
        background: var(--amber-deep);
        color: #1b1408;
        border: none;
        padding: 10px 16px;
        border-radius: 3px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }

      .action-button:hover {
        background: var(--amber);
      }

      .action-button.secondary {
        background: var(--panel-2);
        color: var(--ink-dim);
        border: 1px solid var(--rule);
      }

      .action-button.secondary:hover {
        background: var(--panel-hover);
        color: var(--ink);
      }

      .action-button:disabled {
        background: var(--panel-2);
        color: var(--ink-faint);
        cursor: not-allowed;
      }

      .action-button:disabled:hover {
        background: var(--panel-2);
        color: var(--ink-faint);
      }

      .button-row {
        display: flex;
        gap: 8px;
      }

      .button-row .action-button {
        flex: 1;
      }

      .section-title {
        font-size: 10px;
        text-transform: uppercase;
        color: var(--amber);
        letter-spacing: 0.22em;
        font-weight: 600;
        margin-top: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--rule-soft);
      }

      .fps {
        margin-left: 8px;
        font-size: 11px;
        color: var(--amber);
      }

      header a:focus,
      .action-button:focus,
      .control-group input:focus {
        outline: none;
      }

      header a:focus-visible,
      .action-button:focus-visible,
      .control-group select:focus-visible,
      .control-group input:focus-visible {
        outline: 2px solid var(--amber-soft);
        outline-offset: 2px;
      }

      #canvas-container.fullscreen {
        position: fixed;
        inset: 0;
        background: var(--canvas-bg);
      }
    </style>
  </head>

  <body>
    <script type="module" src="/src/app.tsx"></script>
  </body>
</html>
